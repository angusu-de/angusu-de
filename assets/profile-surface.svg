      <text y="66" font-size="48" font-weight="700" fill="#111214">Built to explain itself.</text>
      <text y="110" font-size="19" fill="#50535c">Public methodology. Private repetition.</text>
      <text y="139" font-size="19" fill="#50535c">Verified evidence. Quiet surface.</text>
      <rect y="180" width="190" height="44" rx="14" fill="#111214"/>
      <text x="95" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Open angusu.de  ↗</text>
      <rect x="204" y="180" width="198" height="44" rx="14" fill="#ffffff" stroke="#d9dad5"/>
      <text x="303" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#111214">Achievement Lab  ↗</text>
    </g>

    <g transform="translate(736 148)">
