<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ANGUSU.DE — Systems, products, interfaces</title>
  <desc id="desc">An editorial profile surface inspired by the ANGUSU.DE signature and InkWall product emails.</desc>
  <rect width="1280" height="640" rx="34" fill="#f5f5f2"/>
  <rect x="34" y="34" width="1212" height="572" rx="28" fill="#ffffff" stroke="#e3e4df"/>

