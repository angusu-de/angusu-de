<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">ANGUSU.DE — The Public Lab</title>
  <desc id="desc">A futuristic command deck displaying observe, build, release, repeat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.48" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#08080f"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#15d1c5"/>
      <stop offset="0.52" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#ff5c7c"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0" stop-color="#7c5cff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#8b90ae" stroke-opacity=".09"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="14"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <clipPath id="frame"><rect x="24" y="24" width="1232" height="592" rx="32"/></clipPath>
  </defs>
  <style>
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .sans{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .scan{animation:scan 7s linear infinite}
    .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
    .dash{stroke-dasharray:8 12;animation:flow 9s linear infinite}
    .blink{animation:blink 1.8s step-end infinite}
    @keyframes scan{0%{transform:translateY(-620px)}100%{transform:translateY(620px)}}
    @keyframes pulse{0%,100%{opacity:.35;transform:scale(.92)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes flow{to{stroke-dashoffset:-200}}
    @keyframes blink{0%,44%{opacity:1}45%,60%{opacity:.15}61%,100%{opacity:1}}
  </style>

  <rect width="1280" height="640" rx="36" fill="url(#bg)"/>
  <g clip-path="url(#frame)">
    <rect x="24" y="24" width="1232" height="592" fill="url(#grid)"/>
    <circle cx="940" cy="224" r="410" fill="url(#glow)"/>
    <circle cx="1090" cy="95" r="150" fill="#15d1c5" opacity=".05" filter="url(#blur)"/>
    <path class="dash" d="M-80 500C180 355 340 580 590 420S930 245 1370 322" fill="none" stroke="url(#signal)" stroke-width="2" opacity=".45"/>
    <rect class="scan" x="24" y="0" width="1232" height="80" fill="url(#signal)" opacity=".035" filter="url(#soft)"/>
  </g>

  <rect x="24" y="24" width="1232" height="592" rx="32" fill="none" stroke="#2b3145" stroke-width="2"/>
  <path d="M64 88H1216" stroke="#2b3145"/>
  <circle cx="62" cy="56" r="6" fill="#ff5c7c"/>
  <circle cx="84" cy="56" r="6" fill="#f5c451"/>
  <circle cx="106" cy="56" r="6" fill="#15d1c5"/>
  <text x="128" y="62" class="mono" fill="#737b98" font-size="13" letter-spacing="2">ANGUSU.DE / PUBLIC COMMAND DECK</text>
  <text x="1214" y="62" text-anchor="end" class="mono" fill="#15d1c5" font-size="12" letter-spacing="1.5">● SIGNAL ONLINE</text>

  <g transform="translate(72 142)">
    <text class="mono" fill="#15d1c5" font-size="14" font-weight="700" letter-spacing="4">THE PUBLIC LAB</text>
    <text y="96" class="sans" fill="#f4f6ff" font-size="92" font-weight="900" letter-spacing="-5">ANGUSU.DE</text>
    <rect y="124" width="632" height="4" rx="2" fill="url(#signal)"/>
    <text y="177" class="sans" fill="#a7aec6" font-size="24" font-weight="500">Systems are not finished.</text>
    <text y="211" class="sans" fill="#f4f6ff" font-size="24" font-weight="760">They are kept alive.</text>
  </g>

  <g transform="translate(820 132)">
    <circle cx="168" cy="168" r="142" fill="none" stroke="#242a3d" stroke-width="2"/>
    <circle cx="168" cy="168" r="105" fill="none" stroke="#303751" stroke-dasharray="4 12"/>
    <circle class="pulse" cx="168" cy="168" r="78" fill="none" stroke="#7c5cff" stroke-width="2" opacity=".8"/>
    <circle cx="168" cy="168" r="10" fill="#15d1c5"/>
    <circle class="pulse" cx="168" cy="168" r="22" fill="#15d1c5" opacity=".12"/>
    <path d="M168 26V310M26 168H310" stroke="#303751"/>
    <path d="M168 168L274 82" stroke="url(#signal)" stroke-width="3"/>
    <circle cx="274" cy="82" r="6" fill="#ff5c7c"/>
    <text x="168" y="358" text-anchor="middle" class="mono" fill="#737b98" font-size="12" letter-spacing="3">RADAR / IDEAS IN MOTION</text>
  </g>

  <g transform="translate(72 504)">
    <g>
      <rect width="236" height="70" rx="15" fill="#0d1220" stroke="#263047"/>
      <circle cx="30" cy="35" r="7" fill="#15d1c5"/>
      <text x="52" y="31" class="mono" fill="#f4f6ff" font-size="13" font-weight="700" letter-spacing="2">OBSERVE</text>
      <text x="52" y="50" class="mono" fill="#737b98" font-size="10">FIND THE REAL SIGNAL</text>
    </g>
    <g transform="translate(254)">
      <rect width="236" height="70" rx="15" fill="#0d1220" stroke="#342c59"/>
      <circle cx="30" cy="35" r="7" fill="#7c5cff"/>
      <text x="52" y="31" class="mono" fill="#f4f6ff" font-size="13" font-weight="700" letter-spacing="2">BUILD</text>
      <text x="52" y="50" class="mono" fill="#737b98" font-size="10">MAKE IT TANGIBLE</text>
    </g>
    <g transform="translate(508)">
      <rect width="236" height="70" rx="15" fill="#0d1220" stroke="#4a2940"/>
      <circle class="blink" cx="30" cy="35" r="7" fill="#ff5c7c"/>
      <text x="52" y="31" class="mono" fill="#f4f6ff" font-size="13" font-weight="700" letter-spacing="2">RELEASE</text>
      <text x="52" y="50" class="mono" fill="#737b98" font-size="10">LET REALITY ANSWER</text>
    </g>
    <text x="1140" y="42" text-anchor="end" class="mono" fill="#737b98" font-size="11" letter-spacing="2">REPEAT ↻</text>
  </g>
</svg>
